{% load static %}
<html>
    <head>
        <title>{% block title %}{% endblock title %}</title>
        <link href="{% static "bootstrap.min.css" %}" rel="stylesheet">
        <link href="{% static "custom.css" %}" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <div class="bg-primary p-5 text-center">
                <img src="{% static "logo.svg" %}" alt="Pokemon logo" class="img-fluid">
            </div>
            <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">
                            <a class="nav-link" href="{% url 'pokedex:index' %}">
                                <i class="fas fa-home"></i>
                                Inicio
                            </a>
                            {% if not user.is_authenticated %}
                                <a class="nav-link" href="{% url 'pokedex:login' %}">
                                    <i class="fas fa-sign-in-alt"></i>
                                    Iniciar sesión
                                </a>
                            {% else %}
                                <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                                <button type="submit" class="nav-link btn btn-link text-white">
                                <i class="fas fa-sign-out-alt"></i>
                                Cerrar sesión
                                </button>
                                </form>
                            {% endif %}
                        </div>
                        <a href="{% url 'pokedex:index' %}" class="nav-link">
                            <i class="fas fa-home"></i>
                            Inicio
                        </a>
                    </div>
                </div>
            </nav>
            {% block content %}{% endblock content %}
        </div>
    </body>
</html>
